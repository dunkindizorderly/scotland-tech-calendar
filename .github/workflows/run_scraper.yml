name: Run Scotland Tech Calendar Scraper

on:
  schedule:
    # This runs the script automatically every Monday morning at 6:00 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # This adds a manual "Run now" button in 
  GitHub
   if you want to test it

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    permissions:
      # Gives GitHub Actions permission to write the updated CSV file back to your repo
      contents: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedparser

    - name: Run the scraper script
      run: python scraper.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action Scraper"
        git config --global user.email "actions@github.com"
        git add *.csv
        git diff-index --quiet HEAD || (git commit -m "Automated Calendar Update: $(date +'%Y-%m-%d')" && git push)
